<!DOCTYPE html>
<html>
<head>
  <title>Boca++ Options</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      width: 300px;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #status {
      margin-top: 10px;
      font-size: 0.9em;
      color: green;
    }
  </style>
</head>
<body>
  <h2>Boca++ Configuration</h2>
  <label for="domain">Target Domain:</label>
  <input type="text" id="domain" placeholder="e.g., boca.telemidia.puc-rio.br">
  <div style="font-size: 0.8em; color: #666; margin-bottom: 10px;">
    Enter the domain where the extension should pass the initial check.
  </div>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
